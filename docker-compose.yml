version: "3.9"

services:
  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://disco_user:disco_pass@postgres:5432/disco_db
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    # Apply migrations then start
    command: >
      sh -c "uv run aerich upgrade && uv run uvicorn main:app --host 0.0.0.0 --port 8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: disco_user
      POSTGRES_PASSWORD: disco_pass
      POSTGRES_DB: disco_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disco_user -d disco_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
