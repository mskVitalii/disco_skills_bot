[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "until uv run aerich upgrade; do echo 'DB not ready, retrying in 5s...'; sleep 5; done && uv run uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.variables]
BOT_TOKEN = { required = true }
DATABASE_URL = { required = true }
REDIS_URL = { required = true }
OPENAI_API_KEY = { required = true }
WEBHOOK_URL = { required = true }
ALLOWED_USER_IDS = { required = false }
OPENAI_MODEL = { default = "gpt-4o-mini" }
WHISPER_MODEL = { default = "whisper-1" }
MAX_SKILL_RESPONSES = { default = "4" }
DEBUG = { default = "false" }
